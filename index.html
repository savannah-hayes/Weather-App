<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl"
      crossorigin="anonymous"
    />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>Weather App</title>
  </head>
  <body>
    <div class="container">
      <div class="weather-app-wrapper">
        <div class="weather-app">
          <form id="search-form">
            <div class="row">
              <div class="col-9">
                <input
                  type="search"
                  placeholder="Enter a city..."
                  id="city-input"
                  autocomplete="off"
                />
              </div>
              <div class="col-3">
                <input type="submit" value="search" id="search-button" />
              </div>
            </div>
          </form>
          <div class="row">
            <div class="col-4">
              <h1 id="city">San Francisco</h1>
              <ul>
                <li class="date-format" id="time"></li>
                <li class="date-format" id="date">March 2, 2021</li>
              </ul>
            </div>
            <div class="col-4 weather-temperature">
              <ul>
                <li id="temperature-unit">
                  <img width="55" src="" alt="" id="icon" />
                  <strong id="temperature"></strong>
                  <span class="units">
                    <a href="#" id="celsius-link" class="active">°C |</a>
                    <a href="#" id="fahrenheit-link">°F</a></span
                  >
                </li>
                <li id="temperature-description"></li>
              </ul>
            </div>
            <div class="col-4">
              <ul>
                <li class="weather-conditions">
                  Wind: <span id="wind"></span> km/h
                </li>
                <li class="weather-conditions">
                  Humidity: <span id="humidity"></span> %
                </li>
                <li class="weather-conditions">
                  Pressure: <span id="pressure"></span> hPa
                </li>
              </ul>
            </div>
          </div>
        </div>
        <small>
          <a
            href="https://github.com/savannah-hayes/Weather-App"
            target="_blank"
            >Open-source</a
          >, by Savannah Hayes</small
        >
      </div>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
