<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--Font awesome-->
    <script
      src="https://kit.fontawesome.com/6de984ddb1.js"
      crossorigin="anonymous"
    ></script>
    <!--Bootstrap-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl"
      crossorigin="anonymous"
    />
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@300&display=swap"
      rel="stylesheet"
    />
    <!--Axios-->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <!--CSS file-->
    <link rel="stylesheet" href="src/style.css" />
    <title>Weather App</title>
  </head>
  <body>
    <!--Weather App-->
    <div class="container">
      <div class="weather-app-wrapper">
        <div class="weather-app">
          <!--Recent cities buttons-->
          <div class="city-buttons">
            <button class="recent-cities" id="sf-button">San Francsico</button>
            <button class="recent-cities" id="tokyo-button">Tokyo</button>
            <button class="recent-cities" id="melbourne-button">
              Melbourne
            </button>
            <button class="recent-cities" id="paris-button">Paris</button>
            <button class="recent-cities" id="sao-button">São Paulo</button>
            <button class="recent-cities" id="lisbon-button">lisbon</button>
          </div>
          <!--Search Engine-->
          <form id="search-form">
            <div class="row">
              <div class="col-9">
                <input
                  type="search"
                  placeholder="Enter a city..."
                  id="city-input"
                  autocomplete="off"
                />
              </div>
              <!--Search button-->
              <div class="col-3">
                <input type="submit" value="search" id="search-button" />
              </div>
            </div>
          </form>
          <div class="row">
            <div class="col-4">
              <!--Name of city and country-->
              <h1 id="city"></h1>
              <!--Current date and time-->
              <ul>
                <li class="date-format">Local time:</li>
                <li class="date-format" id="date"></li>
              </ul>
            </div>
            <!--Temperature units-->
            <div class="col-4 weather-temperature">
              <ul>
                <li id="temperature-unit">
                  <strong id="temperature"></strong>
                  <span class="units">
                    <a href="#" id="celsius-link" class="active">°C |</a>
                    <a href="#" id="fahrenheit-link">°F</a></span
                  >
                </li>
                <!--Current weather description-->
                <li id="temperature-description"></li>
                <img width="55" src="" alt="" id="icon" />
              </ul>
            </div>
            <!--Weather descriptions-->
            <div class="col-4 weather-conditions">
              <ul>
                <li class="weather-description">
                  Feels like: <span id="feels-like"></span>°
                </li>
                <li class="weather-description">
                  Wind: <span id="wind"></span> km/h
                </li>
                <li class="weather-description">
                  Humidity: <span id="humidity"></span> %
                </li>
                <li class="weather-description">
                  Pressure: <span id="pressure"></span> hPa
                </li>
              </ul>
            </div>
          </div>
          <!--3-Hour forecast section-->
          <div class="hour-forecast">Daily Forecast</div>
          <div class="row weather-forecast" id="forecast"></div>
        </div>
      </div>
      <!--Footer-->
      <div id="github-link">
        <small>
          <a
            href="https://github.com/savannah-hayes/Weather-App"
            target="_blank"
            >Open-source</a
          >, by Savannah Hayes</small
        >
      </div>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
