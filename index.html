<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--Font awesome-->
    <script
      src="https://kit.fontawesome.com/6de984ddb1.js"
      crossorigin="anonymous"
    ></script>
    <!--Bootstrap-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl"
      crossorigin="anonymous"
    />
    <!--fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <!--Google Fonts-->
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@300&display=swap"
      rel="stylesheet"
    />
    <!--Axios-->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <!--CSS file-->
    <link rel="stylesheet" href="src/style.css" />
    <title>Weather App</title>
  </head>
  <body>
    <!--Weather App-->
    <div class="container">
      <div class="weather-app-wrapper">
        <div class="weather-app">
          <!--Recent cities buttons-->
          <div class="city-buttons">
            <button class="recent-cities" id="tokyo-button">Tokyo</button>
            <button class="recent-cities" id="sf-button">San Francisco</button>
            <button class="recent-cities" id="capetown-button">
              Cape Town
            </button>
            <button class="recent-cities" id="melbourne-button">
              Melbourne
            </button>
            <button class="recent-cities" id="saopaulo-button">
              São Paulo
            </button>
            <button class="recent-cities" id="london-button">London</button>
          </div>
          <!--Search Engine-->
          <form class="search-form" id="search-form">
            <div class="row">
              <div class="col-9">
                <input
                  type="search"
                  placeholder="Enter a city..."
                  class="city-input"
                  id="city-input"
                  autocomplete="off"
                />
              </div>
              <!--Search button-->
              <div class="col-3">
                <input
                  type="submit"
                  value="Search"
                  class="search-button"
                  id="search-button"
                />
              </div>
            </div>
          </form>
          <div class="row">
            <div class="col-sm-4 city-date">
              <!--Name of city and country-->
              <h1 class="city" id="city"></h1>
              <!--Current date and time-->
              <ul>
                <li class="date-format">Local time:</li>
                <li class="date-format" id="date"></li>
              </ul>
            </div>
            <!--Temperature units-->
            <div class="col-sm-4 weather-temperature">
              <ul>
                <li class="temperature-unit" id="temperature-unit">
                  <strong class="temperature" id="temperature"></strong>
                  <span class="units">
                    <a href="#" id="celsius-link" class="active celsius-link"
                      >°C |</a
                    >
                    <a href="#" class="fahrenheit-link" id="fahrenheit-link"
                      >°F</a
                    ></span
                  >
                </li>
                <!--Current weather description-->
                <li
                  class="temperature-description"
                  id="temperature-description"
                ></li>
              </ul>
            </div>
            <!--Weather descriptions-->
            <div class="col-sm-4 weather-conditions">
              <h2>Feels like: <span id="feels-like"></span><small>°</small></h2>
              <ul>
                <li class="weather-description">
                  Wind: <span id="wind"></span> m/s
                </li>
                <li class="weather-description">
                  Humidity: <span id="humidity"> </span> %
                </li>
                <li class="weather-description">
                  Pressure: <span id="pressure"></span> hPa
                </li>
              </ul>
            </div>
          </div>
          <!--3-Hour forecast section-->
          <div class="hour-forecast">Daily Forecast:</div>
          <div class="row weather-forecast" id="forecast"></div>
        </div>
        <!--Footer-->
        <footer class="github-link" id="github-link">
          <small>
            Open-source
            <a
              href="https://github.com/savannah-hayes/Weather-App"
              target="_blank"
              ><i class="fab fa-github"></i></a
            >, by Savannah Hayes
            <a
              href="http://linkedin.com/in/savannah-hayes-128b0418a"
              target="_blank"
              ><i class="fab fa-linkedin-in"></i>
            </a>
          </small>
        </footer>
      </div>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
